<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>L'Affaire Executive</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="bg-blur blur-1"></div>
<div class="bg-blur blur-2"></div>

<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div>

            <!-- LOGO -->
            <div class="logo-area">

                <div class="brand">
                    L’AFFAIRE
                </div>

                <div class="premium-badge">
                    EXECUTIVE PANEL
                </div>

            </div>

            <!-- USER -->
            <div class="user-card">

                <img
                    id="avatarImg"
                    class="avatar-img"
                    src="/img/default.jpg"
                >

                <div>

                    <div class="welcome">
                        Bienvenido
                    </div>

                    <div
                        id="usuario"
                        class="username">

                        admin

                    </div>

                </div>

            </div>

            <!-- MENU -->
            <div class="menu">

                <button class="menu-btn active">
                    Dashboard
                </button>

                <!-- SOLO UNA OPCION -->
                <button
                    class="menu-btn"
                    onclick="toggleHistorial()">

                    Historial Eventos

                </button>

            </div>

        </div>

        <!-- LOGOUT -->
        <button
            class="logout"
            onclick="logout()">

            Cerrar sesión

        </button>

    </aside>

    <!-- MAIN -->
    <main class="main">

        <!-- TOPBAR -->
        <div class="topbar">

            <div>

                <h1>
                    Dashboard Ejecutivo
                </h1>

                <p>
                    Sistema premium de administración
                </p>

            </div>

            <div class="event-pill">

                Evento 04 de Mayo

            </div>

        </div>

        <!-- STATS -->
        <div class="stats">

            <div class="stat-card glass">

                <div class="stat-label">
                    Participantes
                </div>

                <div
                    class="stat-value"
                    id="total">

                    0

                </div>

            </div>

            <div class="stat-card glass">

                <div class="stat-label">
                    Ingresos
                </div>

                <div
                    class="stat-value"
                    id="ingresos">

                    $0

                </div>

            </div>

            <div class="stat-card glass">

                <div class="stat-label">
                    Ganancias
                </div>

                <div
                    class="stat-value"
                    id="comisiones">

                    $0

                </div>

            </div>

            <div
                class="stat-card glass admin-only"
                id="quitoCard">

                <div class="stat-label">
                    Quito
                </div>

                <div class="stat-value">
                    0
                </div>

            </div>

            <div
                class="stat-card glass admin-only"
                id="guayaquilCard">

                <div class="stat-label">
                    Guayaquil
                </div>

                <div class="stat-value">
                    0
                </div>

            </div>

        </div>

        <!-- FORM -->
        <div class="premium-card glass">

            <div class="section-title">
                Nuevo Participante
            </div>

            <div class="form-grid">

                <input id="nombre" placeholder="Nombre completo">

                <input id="telefono" placeholder="Teléfono">

                <input id="edad" placeholder="Edad">

                <input id="rol" placeholder="Rol">

                <input id="banco" placeholder="Banco">

                <input id="pago" placeholder="Pago">

            </div>

            <button
                class="save-btn"
                onclick="agregar()">

                Guardar Participante

            </button>

        </div>

        <!-- TABLA -->
        <div class="premium-card glass">

            <div class="table-header">

                <div class="section-title">
                    Participantes
                </div>

                <button
                    class="archive-btn"
                    onclick="archivarEvento()">

                    Archivar Evento

                </button>

            </div>

            <div class="table-container">

                <table class="tabla">

                    <thead>

                    <tr>

                        <th>Nombre</th>
                        <th>Pago</th>
                        <th>Ciudad</th>
                        <th>Captador</th>
                        <th>Acciones</th>

                    </tr>

                    </thead>

                    <tbody id="lista"></tbody>

                </table>

            </div>

        </div>

    </main>

</div>

<script src="app.js"></script>

</body>
</html>

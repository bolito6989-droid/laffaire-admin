<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>L'Affaire Black Executive</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;

overflow:hidden;

display:flex;
justify-content:center;
align-items:center;

font-family:'Inter',sans-serif;

background:
radial-gradient(circle at top left,#5c4100 0%,transparent 26%),
radial-gradient(circle at bottom right,#2b0055 0%,transparent 25%),
linear-gradient(
135deg,
#020202,
#050505,
#000000
);

position:relative;

}

/* GRID */

body::before{

content:"";

position:absolute;
inset:0;

background-image:

linear-gradient(
rgba(255,255,255,.025) 1px,
transparent 1px
),

linear-gradient(
90deg,
rgba(255,255,255,.025) 1px,
transparent 1px
);

background-size:55px 55px;

mask-image:
radial-gradient(circle at center,
black 40%,
transparent 95%);

opacity:.4;

}

/* BLURS */

.blur{

position:absolute;

border-radius:50%;

filter:blur(140px);

opacity:.28;

animation:float 8s ease-in-out infinite alternate;

}

.blur1{

width:520px;
height:520px;

background:#d4af37;

top:-180px;
left:-180px;

}

.blur2{

width:420px;
height:420px;

background:#6d28d9;

bottom:-150px;
right:-120px;

animation-delay:2s;

}

.blur3{

width:300px;
height:300px;

background:#ffb300;

top:40%;
left:10%;

opacity:.12;

animation-delay:4s;

}

@keyframes float{

from{
transform:translateY(0px);
}

to{
transform:translateY(45px);
}

}

/* PARTICLES */

.particles{

position:absolute;
inset:0;

overflow:hidden;

}

.particles span{

position:absolute;

width:3px;
height:3px;

background:white;

border-radius:50%;

opacity:.5;

animation:particle 12s linear infinite;

}

@keyframes particle{

from{

transform:
translateY(100vh)
scale(.5);

opacity:0;

}

10%{
opacity:.7;
}

to{

transform:
translateY(-100px)
scale(1.2);

opacity:0;

}

}

/* MAIN CARD */

.login-card{

width:560px;

padding:65px 60px;

border-radius:42px;

position:relative;

overflow:hidden;

background:
linear-gradient(
180deg,
rgba(255,255,255,.09),
rgba(255,255,255,.02)
);

border:
1px solid rgba(255,255,255,.08);

backdrop-filter:blur(35px);

box-shadow:
0 30px 100px rgba(0,0,0,.75),
0 0 120px rgba(212,175,55,.12),
inset 0 1px 0 rgba(255,255,255,.08);

animation:fadeUp 1s ease;

}

/* GOLD LINE */

.login-card::before{

content:"";

position:absolute;

top:0;
left:0;

width:100%;
height:5px;

background:
linear-gradient(
90deg,
#d4af37,
#ffdf70,
transparent
);

}

/* SHINE EFFECT */

.login-card::after{

content:"";

position:absolute;

top:-200px;
left:-150px;

width:250px;
height:900px;

background:
linear-gradient(
90deg,
transparent,
rgba(255,255,255,.12),
transparent
);

transform:rotate(20deg);

animation:shine 8s linear infinite;

}

@keyframes shine{

0%{
left:-350px;
}

100%{
left:900px;
}

}

@keyframes fadeUp{

from{

opacity:0;
transform:
translateY(40px)
scale(.98);

}

to{

opacity:1;
transform:
translateY(0)
scale(1);

}

}

/* LOGO */

.logo{

display:flex;
justify-content:center;

margin-bottom:25px;

position:relative;

}

.logo::before{

content:"";

position:absolute;

width:280px;
height:280px;

background:
radial-gradient(
circle,
rgba(212,175,55,.18),
transparent 70%
);

filter:blur(30px);

z-index:0;

}

.logo img{

width:300px;

position:relative;
z-index:2;

filter:
drop-shadow(0 0 35px rgba(212,175,55,.35))
drop-shadow(0 0 80px rgba(212,175,55,.18));

animation:logoFloat 4s ease-in-out infinite alternate;

}

@keyframes logoFloat{

from{
transform:translateY(0px);
}

to{
transform:translateY(-10px);
}

}

/* TITLE */

.login-title{

text-align:center;

margin-bottom:38px;

}

.login-title h1{

font-size:60px;

font-weight:900;

line-height:1;

margin-bottom:14px;

letter-spacing:-3px;

background:
linear-gradient(
135deg,
#ffffff,
#d4d4d4
);

background-clip:text;
-webkit-background-clip:text;

color:transparent;
-webkit-text-fill-color:transparent;

}

.login-title p{

font-size:16px;

color:#8b8b8b;

letter-spacing:1px;

}

/* INPUTS */

.input-group{

margin-bottom:24px;

position:relative;

}

.input-group input{

width:100%;

padding:24px 26px;

border-radius:24px;

border:
1px solid rgba(255,255,255,.08);

background:
rgba(255,255,255,.035);

color:white;

font-size:17px;

outline:none;

transition:.35s;

backdrop-filter:blur(10px);

}

.input-group input::placeholder{

color:#777;

}

.input-group input:focus{

transform:translateY(-3px);

border:
1px solid rgba(212,175,55,.65);

background:
rgba(255,255,255,.05);

box-shadow:
0 0 0 5px rgba(212,175,55,.08),
0 15px 40px rgba(212,175,55,.12);

}

/* BUTTON */

.login-btn{

width:100%;

padding:24px;

border:none;

border-radius:24px;

background:
linear-gradient(
135deg,
#e5bc39,
#c99700
);

color:black;

font-size:20px;
font-weight:900;

cursor:pointer;

transition:.35s;

margin-top:10px;

letter-spacing:.5px;

box-shadow:
0 20px 50px rgba(212,175,55,.28);

position:relative;

overflow:hidden;

}

.login-btn::before{

content:"";

position:absolute;

top:0;
left:-100%;

width:100%;
height:100%;

background:
linear-gradient(
90deg,
transparent,
rgba(255,255,255,.35),
transparent
);

transition:.7s;

}

.login-btn:hover::before{

left:100%;

}

.login-btn:hover{

transform:translateY(-4px);

box-shadow:
0 25px 60px rgba(212,175,55,.4);

}

/* FOOTER */

.footer{

margin-top:32px;

text-align:center;

font-size:13px;

letter-spacing:1px;

color:#666;

}

/* SPINNER */

.spinner{

width:24px;
height:24px;

border-radius:50%;

border:3px solid rgba(0,0,0,.2);

border-top:3px solid black;

margin:auto;

animation:spin 1s linear infinite;

}

@keyframes spin{

to{
transform:rotate(360deg);
}

}

/* MOBILE */

@media(max-width:600px){

.login-card{

width:92%;

padding:40px 28px;

}

.logo img{

width:220px;

}

.login-title h1{

font-size:42px;

}

}

</style>

</head>

<body>

<!-- BLURS -->
<div class="blur blur1"></div>
<div class="blur blur2"></div>
<div class="blur blur3"></div>

<!-- PARTICLES -->
<div class="particles">

<span style="left:10%;animation-delay:0s;"></span>
<span style="left:20%;animation-delay:2s;"></span>
<span style="left:30%;animation-delay:4s;"></span>
<span style="left:40%;animation-delay:1s;"></span>
<span style="left:50%;animation-delay:5s;"></span>
<span style="left:60%;animation-delay:3s;"></span>
<span style="left:70%;animation-delay:7s;"></span>
<span style="left:80%;animation-delay:6s;"></span>
<span style="left:90%;animation-delay:2s;"></span>

</div>

<!-- LOGIN -->
<div class="login-card">

    <!-- LOGO -->
    <div class="logo">

        <img src="/logo2.png">

    </div>

    <!-- TITLE -->
    <div class="login-title">

        <h1>
            Executive Access
        </h1>

        <p>
            Plataforma bancaria premium de administración
        </p>

    </div>

    <!-- USER -->
    <div class="input-group">

        <input
            id="user"
            placeholder="Usuario">

    </div>

    <!-- PASS -->
    <div class="input-group">

        <input
            id="pass"
            type="password"
            placeholder="Contraseña">

    </div>

    <!-- BTN -->
    <button
        id="btn"
        class="login-btn"
        onclick="login()">

        Ingresar

    </button>

    <!-- FOOTER -->
    <div class="footer">

        L'Affaire Black Executive © 2026

    </div>

</div>

<script>

// ENTER LOGIN
document.addEventListener("keydown", function(e){

    if(e.key === "Enter"){

        login();

    }

});

// LOGIN
async function login(){

    btn.innerHTML =
    '<div class="spinner"></div>';

    btn.disabled = true;

    try{

        const res = await fetch('/login', {

            method:'POST',

            headers:{
                'Content-Type':'application/json'
            },

            body:JSON.stringify({

                username:user.value,
                password:pass.value

            })

        });

        const data = await res.json();

        if(data.token){

            localStorage.setItem(
                "token",
                data.token
            );

            localStorage.setItem(
                "user",
                user.value
            );

            document.body.style.opacity = "0";

            setTimeout(()=>{

                window.location =
                "dashboard.html";

            },500);

        }else{

            btn.innerHTML =
            "Ingresar";

            btn.disabled = false;

            alert(
                "Credenciales incorrectas"
            );

        }

    }catch(err){

        btn.innerHTML =
        "Ingresar";

        btn.disabled = false;

        alert(
            "Error de conexión"
        );

    }

}

</script>

</body>
</html>

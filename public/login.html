<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>L'Affaire Login</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    overflow:hidden;
    font-family:'Inter',sans-serif;
    position:relative;
}

/* FONDO */
body::before{
    content:"";
    position:absolute;
    width:700px;
    height:700px;
    background:radial-gradient(circle,rgba(212,175,55,0.15),transparent 70%);
    filter:blur(100px);
    animation:move 8s infinite alternate;
}

@keyframes move{
    from{
        transform:translate(-60px,-40px);
    }
    to{
        transform:translate(60px,40px);
    }
}

/* CARD */
.card{
    width:420px;
    background:rgba(5,5,5,.96);
    border:1px solid rgba(212,175,55,.15);
    border-radius:28px;
    padding:45px;
    position:relative;
    z-index:2;
    box-shadow:0 0 50px rgba(0,0,0,.9);
}

/* LOGO */
.logo{
    text-align:center;
    margin-bottom:10px;
}

.logo img{
    width:220px;
}

/* CIUDAD */
.ciudad{
    text-align:center;
    color:#d4af37;
    font-weight:600;
    margin-bottom:30px;
    font-size:18px;
}

/* INPUTS */
.input-group{
    margin-bottom:18px;
}

.input-group input{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    background:#0d0d0d;
    color:white;
    font-size:15px;
    outline:none;
    border:1px solid rgba(255,255,255,.05);
    transition:.3s;
}

.input-group input:focus{
    border:1px solid rgba(212,175,55,.6);
    box-shadow:0 0 20px rgba(212,175,55,.15);
}

/* BOTON */
button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#d4af37,#b8962e);
    color:black;
    font-weight:700;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 30px rgba(212,175,55,.25);
}

/* SPINNER */
.spinner{
    width:20px;
    height:20px;
    border:3px solid rgba(0,0,0,.2);
    border-top:3px solid black;
    border-radius:50%;
    margin:auto;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

</style>
</head>

<body>

<div class="card">

    <div class="logo">
        <img src="/logo.png">
    </div>

    <div class="ciudad" id="ciudadText"></div>

    <div class="input-group">
        <input id="user" placeholder="Usuario">
    </div>

    <div class="input-group">
        <input id="pass" type="password" placeholder="Contraseña">
    </div>

    <button id="btn" onclick="login()">
        Ingresar
    </button>

</div>

<script>

// ================= CIUDAD =================
const ciudad = localStorage.getItem("ciudad") || "Quito";

document.getElementById("ciudadText").innerText =
    "Evento: " + ciudad;

// ================= ENTER =================
document.addEventListener("keydown", function(e){

    if(e.key === "Enter"){
        login();
    }
});

// ================= LOGIN =================
async function login(){

    const btn = document.getElementById("btn");

    btn.innerHTML = '<div class="spinner"></div>';

    const res = await fetch('/login', {

        method:'POST',

        headers:{
            'Content-Type':'application/json'
        },

        body:JSON.stringify({
            username:user.value,
            password:pass.value
        })
    });

    const data = await res.json();

    if(data.token){

        localStorage.setItem("token", data.token);
        localStorage.setItem("user", data.username);

        window.location = "dashboard.html";

    }else{

        btn.innerHTML = "Ingresar";

        alert("Credenciales incorrectas");
    }
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>L'Affaire Executive Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;

overflow:hidden;

display:flex;
justify-content:center;
align-items:center;

font-family:'Inter',sans-serif;

background:
radial-gradient(circle at top left,#2f2100 0%,transparent 30%),
radial-gradient(circle at bottom right,#1d0038 0%,transparent 25%),
#030303;

position:relative;

}

/* FONDO PREMIUM */

.bg-blur{

position:absolute;

border-radius:50%;

filter:blur(140px);

opacity:.25;

animation:float 8s ease-in-out infinite alternate;

}

.blur1{

width:420px;
height:420px;

background:#d4af37;

top:-120px;
left:-100px;

}

.blur2{

width:350px;
height:350px;

background:#8b5cf6;

bottom:-120px;
right:-100px;

}

@keyframes float{

from{
transform:translateY(0px);
}

to{
transform:translateY(40px);
}

}

/* PARTICULAS */

.particles{

position:absolute;
inset:0;

overflow:hidden;

}

.particles span{

position:absolute;

width:3px;
height:3px;

background:rgba(255,255,255,.6);

border-radius:50%;

animation:particle 12s linear infinite;

}

@keyframes particle{

from{
transform:translateY(100vh);
opacity:0;
}

10%{
opacity:1;
}

to{
transform:translateY(-100px);
opacity:0;
}

}

/* CARD */

.login-card{

width:460px;

padding:50px;

border-radius:36px;

background:
linear-gradient(
180deg,
rgba(255,255,255,.06),
rgba(255,255,255,.025)
);

border:
1px solid rgba(255,255,255,.08);

backdrop-filter:blur(25px);

box-shadow:
0 20px 60px rgba(0,0,0,.55),
0 0 80px rgba(212,175,55,.08);

position:relative;

overflow:hidden;

animation:fadeUp 1s ease;

}

.login-card::before{

content:"";

position:absolute;

top:0;
left:0;

width:100%;
height:4px;

background:
linear-gradient(
90deg,
#d4af37,
transparent
);

}

@keyframes fadeUp{

from{

opacity:0;
transform:translateY(40px);

}

to{

opacity:1;
transform:translateY(0);

}

}

/* LOGO */

.logo{

text-align:center;

margin-bottom:20px;

}

.logo h1{

font-size:72px;

font-family:'Playfair Display',serif;

color:#d4af37;

letter-spacing:-3px;

text-shadow:
0 0 30px rgba(212,175,55,.3);

}

.logo p{

margin-top:10px;

color:#888;

font-size:15px;

letter-spacing:2px;

}

/* TITULO */

.login-title{

margin-top:35px;
margin-bottom:30px;

}

.login-title h2{

font-size:42px;

font-weight:800;

line-height:1;

margin-bottom:10px;

}

.login-title p{

color:#777;

font-size:15px;

}

/* INPUTS */

.input-group{

margin-bottom:22px;

position:relative;

}

.input-group input{

width:100%;

padding:22px;

padding-left:24px;

border-radius:20px;

border:
1px solid rgba(255,255,255,.08);

background:
rgba(255,255,255,.03);

color:white;

font-size:16px;

outline:none;

transition:.35s;

}

.input-group input:focus{

border:
1px solid rgba(212,175,55,.6);

background:
rgba(255,255,255,.05);

transform:translateY(-2px);

box-shadow:
0 0 0 5px rgba(212,175,55,.08);

}

/* BOTON */

.login-btn{

width:100%;

padding:22px;

border:none;

border-radius:20px;

background:
linear-gradient(
135deg,
#d4af37,
#b98a11
);

color:black;

font-size:18px;
font-weight:800;

cursor:pointer;

transition:.35s;

margin-top:10px;

box-shadow:
0 15px 35px rgba(212,175,55,.22);

}

.login-btn:hover{

transform:translateY(-3px);

box-shadow:
0 20px 45px rgba(212,175,55,.35);

}

/* FOOTER */

.footer{

margin-top:28px;

text-align:center;

color:#666;

font-size:13px;

}

/* SPINNER */

.spinner{

width:22px;
height:22px;

border-radius:50%;

border:3px solid rgba(0,0,0,.2);

border-top:3px solid black;

margin:auto;

animation:spin 1s linear infinite;

}

@keyframes spin{

to{
transform:rotate(360deg);
}

}

/* MOBILE */

@media(max-width:600px){

.login-card{

width:92%;

padding:35px;

}

.logo h1{

font-size:52px;

}

.login-title h2{

font-size:34px;

}

}

</style>

</head>

<body>

<!-- BLURS -->
<div class="bg-blur blur1"></div>
<div class="bg-blur blur2"></div>

<!-- PARTICULAS -->
<div class="particles">

<span style="left:10%;animation-delay:0s;"></span>
<span style="left:20%;animation-delay:2s;"></span>
<span style="left:30%;animation-delay:4s;"></span>
<span style="left:40%;animation-delay:1s;"></span>
<span style="left:50%;animation-delay:5s;"></span>
<span style="left:60%;animation-delay:3s;"></span>
<span style="left:70%;animation-delay:7s;"></span>
<span style="left:80%;animation-delay:6s;"></span>
<span style="left:90%;animation-delay:2s;"></span>

</div>

<!-- CARD -->
<div class="login-card">

    <div class="logo">

        <h1>L’AFFAIRE</h1>

        <p>
            EXECUTIVE ACCESS
        </p>

    </div>

    <div class="login-title">

        <h2>
            Bienvenido
        </h2>

        <p>
            Sistema premium de administración
        </p>

    </div>

    <div class="input-group">

        <input
            id="user"
            placeholder="Usuario">

    </div>

    <div class="input-group">

        <input
            id="pass"
            type="password"
            placeholder="Contraseña">

    </div>

    <button
        id="btn"
        class="login-btn"
        onclick="login()">

        Ingresar

    </button>

    <div class="footer">

        L'Affaire Executive © 2026

    </div>

</div>

<script>

// ENTER LOGIN
document.addEventListener("keydown", function(e){

    if(e.key === "Enter"){

        login();

    }

});

// LOGIN
async function login(){

    btn.innerHTML =
    '<div class="spinner"></div>';

    btn.disabled = true;

    try{

        const res = await fetch('/login', {

            method:'POST',

            headers:{
                'Content-Type':'application/json'
            },

            body:JSON.stringify({

                username:user.value,
                password:pass.value

            })

        });

        const data = await res.json();

        if(data.token){

            localStorage.setItem(
                "token",
                data.token
            );

            localStorage.setItem(
                "user",
                user.value
            );

            document.body.style.opacity = "0";

            setTimeout(()=>{

                window.location =
                "dashboard.html";

            },500);

        }else{

            btn.innerHTML =
            "Ingresar";

            btn.disabled = false;

            alert(
                "Credenciales incorrectas"
            );

        }

    }catch(err){

        btn.innerHTML =
        "Ingresar";

        btn.disabled = false;

        alert(
            "Error de conexión"
        );

    }

}

</script>

</body>
</html>
